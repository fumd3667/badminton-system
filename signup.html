<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng Ký — AU Badminton</title>
  <meta name="description" content="Đăng ký tài khoản hệ thống đặt sân cầu lông AU Badminton."/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <style>
    .password-toggle { position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%); color: var(--gray-400); cursor: pointer; font-size: 0.9rem; transition: color 0.2s; }
    .password-toggle:hover { color: var(--primary); }
    .form-error { font-size: 0.78rem; color: var(--danger); margin-top: 0.35rem; display: none; }
    .au-input.error { border-color: var(--danger); }
    .floating-courts { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; gap: 1rem; z-index: 2; }
    .floating-chip { background: rgba(255,255,255,0.12); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 0.75rem; font-weight: 500; padding: 0.4em 0.9em; border-radius: 99px; display: flex; align-items: center; gap: 5px; }
    .floating-chip .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="floating-courts">
    <div class="floating-chip"><div class="dot"></div> 4 Sân Đang Hoạt Động</div>
    <div class="floating-chip">🏸 Đặt sân chỉ 30 giây</div>
    <div class="floating-chip">💳 Thanh toán linh hoạt</div>
  </div>

  <div class="login-card anim-fadeup">
    <div class="text-center mb-4">
      <div class="login-logo">🏸</div>
      <h1 style="font-size:1.5rem;font-weight:800;color:var(--gray-900);margin-bottom:0.25rem;">AU Badminton</h1>
      <p style="color:var(--gray-400);font-size:0.85rem;">Đăng ký tài khoản mới</p>
    </div>

    <form id="signupForm" novalidate>
      <div class="au-form-group">
        <label class="au-label" for="fullname">Họ và tên</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-address-card input-icon"></i>
          <input type="text" class="au-input" id="fullname" name="fullname" placeholder="Nhập họ và tên..." required/>
        </div>
        <div class="form-error" id="err-fullname">Vui lòng nhập họ và tên.</div>
      </div>

      <div class="au-form-group">
        <label class="au-label" for="username">Tên đăng nhập</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" class="au-input" id="username" name="username" placeholder="Nhập tên đăng nhập..." autocomplete="username" required/>
        </div>
        <div class="form-error" id="err-username">Vui lòng nhập tên đăng nhập.</div>
      </div>

      <!-- ĐÃ THÊM Ô NHẬP SỐ ĐIỆN THOẠI -->
      <div class="au-form-group">
        <label class="au-label" for="phone">Số điện thoại</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-phone input-icon"></i>
          <input type="tel" class="au-input" id="phone" name="phone" placeholder="Nhập số điện thoại..." required/>
        </div>
        <div class="form-error" id="err-phone">Vui lòng nhập số điện thoại.</div>
      </div>

      <div class="au-form-group">
        <label class="au-label" for="password">Mật khẩu</label>
        <div class="input-icon-wrap" style="position:relative;">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" class="au-input" id="password" name="password" placeholder="Nhập mật khẩu..." autocomplete="new-password" required style="padding-right:2.8rem;"/>
          <span class="password-toggle" id="togglePassword"><i class="fa-regular fa-eye" id="eyeIcon"></i></span>
        </div>
        <div class="form-error" id="err-password">Vui lòng nhập mật khẩu.</div>
      </div>

      <div class="au-form-group">
        <label class="au-label" for="confirmPassword">Xác nhận mật khẩu</label>
        <div class="input-icon-wrap" style="position:relative;">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" class="au-input" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu..." autocomplete="new-password" required style="padding-right:2.8rem;"/>
          <span class="password-toggle" id="toggleConfirmPassword"><i class="fa-regular fa-eye" id="eyeIconConfirm"></i></span>
        </div>
        <div class="form-error" id="err-confirmPassword">Mật khẩu không khớp.</div>
      </div>

      <button type="submit" class="btn-au-primary w-100 mt-2" id="signupBtn" style="width:100%;padding:0.85rem;">
        <i class="fa-solid fa-user-plus me-2"></i>Đăng Ký
      </button>

      <div class="login-divider">hoặc</div>

      <div style="text-align:center;font-size:0.85rem;color:var(--gray-400);">
        Đã có tài khoản? <a href="login.html" style="color:var(--primary);font-weight:600;text-decoration:none;"> Đăng nhập</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('togglePassword').addEventListener('click', function() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pw.type === 'password') { pw.type = 'text'; icon.className = 'fa-regular fa-eye-slash'; } 
    else { pw.type = 'password'; icon.className = 'fa-regular fa-eye'; }
  });

  document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
    const pw = document.getElementById('confirmPassword');
    const icon = document.getElementById('eyeIconConfirm');
    if (pw.type === 'password') { pw.type = 'text'; icon.className = 'fa-regular fa-eye-slash'; } 
    else { pw.type = 'password'; icon.className = 'fa-regular fa-eye'; }
  });

  document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const fullname = document.getElementById('fullname').value.trim();
    const username = document.getElementById('username').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();
    let valid = true;

    ['fullname', 'username', 'phone', 'password', 'confirmPassword'].forEach(id => {
      document.getElementById('err-' + id).style.display = 'none';
      document.getElementById(id).classList.remove('error');
    });

    if (!fullname) { document.getElementById('fullname').classList.add('error'); document.getElementById('err-fullname').style.display = 'block'; valid = false; }
    if (!username) { document.getElementById('username').classList.add('error'); document.getElementById('err-username').style.display = 'block'; valid = false; }
    if (!phone) { document.getElementById('phone').classList.add('error'); document.getElementById('err-phone').style.display = 'block'; valid = false; }
    if (!password) { document.getElementById('password').classList.add('error'); document.getElementById('err-password').style.display = 'block'; valid = false; }
    if (password !== confirmPassword) { document.getElementById('confirmPassword').classList.add('error'); document.getElementById('err-confirmPassword').style.display = 'block'; valid = false; }

    if (!valid) return;

    const btn = document.getElementById('signupBtn');
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Đang xử lý...';
    btn.disabled = true;

    try {
      const res = await fetch('http://localhost:8080/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fullname, username, phone, password }),
        signal: AbortSignal.timeout(3000)
      });
      const data = await res.json();
      
      if (data.success) {
        showSuccess('Đăng ký thành công! Đang chuyển hướng...');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
      } else {
        throw new Error(data.message || 'Lỗi khi đăng ký');
      }
    } catch (err) {
      showError(err.message || 'Lỗi kết nối máy chủ');
      btn.innerHTML = '<i class="fa-solid fa-user-plus me-2"></i>Đăng Ký';
      btn.disabled = false;
    }
  });

  function showError(msg) {
    let errDiv = document.getElementById('signup-msg-global');
    if (!errDiv) { errDiv = document.createElement('div'); errDiv.id = 'signup-msg-global'; document.getElementById('signupBtn').parentNode.insertBefore(errDiv, document.getElementById('signupBtn')); }
    errDiv.style.cssText = 'background:#FEE2E2;border:1px solid #FCA5A5;border-radius:8px;padding:0.75rem 1rem;font-size:0.85rem;color:#B91C1C;margin-bottom:1rem;text-align:center;';
    errDiv.textContent = '❌ ' + msg;
  }

  function showSuccess(msg) {
    let errDiv = document.getElementById('signup-msg-global');
    if (!errDiv) { errDiv = document.createElement('div'); errDiv.id = 'signup-msg-global'; document.getElementById('signupBtn').parentNode.insertBefore(errDiv, document.getElementById('signupBtn')); }
    errDiv.style.cssText = 'background:#D1FAE5;border:1px solid #6EE7B7;border-radius:8px;padding:0.75rem 1rem;font-size:0.85rem;color:#047857;margin-bottom:1rem;text-align:center;';
    errDiv.textContent = '✅ ' + msg;
  }
</script>
</body>
</html>
