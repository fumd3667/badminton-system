<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng Nhập — AU Badminton</title>
  <meta name="description" content="Đăng nhập vào hệ thống đặt sân cầu lông AU Badminton."/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <style>
    .password-toggle {
      position: absolute; right: 0.9rem; top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400); cursor: pointer; font-size: 0.9rem;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: var(--primary); }
    .form-error {
      font-size: 0.78rem; color: var(--danger);
      margin-top: 0.35rem; display: none;
    }
    .au-input.error { border-color: var(--danger); }
    .remember-row { display: flex; align-items: center; justify-content: space-between; }
    .au-checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; color: var(--gray-600); }
    .au-checkbox input { accent-color: var(--primary); width: 16px; height: 16px; cursor: pointer; }
    .forgot-link { font-size: 0.85rem; color: var(--primary); text-decoration: none; font-weight: 500; }
    .forgot-link:hover { text-decoration: underline; }
    .floating-courts {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 1rem; z-index: 2;
    }
    .floating-chip {
      background: rgba(255,255,255,0.12); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white; font-size: 0.75rem; font-weight: 500;
      padding: 0.4em 0.9em; border-radius: 99px;
      display: flex; align-items: center; gap: 5px;
    }
    .floating-chip .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="floating-courts">
    <div class="floating-chip"><div class="dot"></div> 4 Sân Đang Hoạt Động</div>
    <div class="floating-chip">🏸 Đặt sân chỉ 30 giây</div>
    <div class="floating-chip">💳 Thanh toán linh hoạt</div>
  </div>

  <div class="login-card anim-fadeup">
    <div class="text-center mb-4">
      <div class="login-logo">🏸</div>
      <h1 style="font-size:1.5rem;font-weight:800;color:var(--gray-900);margin-bottom:0.25rem;">AU Badminton</h1>
      <p style="color:var(--gray-400);font-size:0.85rem;">Hệ thống đặt sân cầu lông chuyên nghiệp</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="au-form-group">
        <label class="au-label" for="username">Tên đăng nhập</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" class="au-input" id="username" name="username"
                 placeholder="Nhập tên đăng nhập..." autocomplete="username" required/>
        </div>
        <div class="form-error" id="err-username">Vui lòng nhập tên đăng nhập.</div>
      </div>

      <div class="au-form-group">
        <label class="au-label" for="password">Mật khẩu</label>
        <div class="input-icon-wrap" style="position:relative;">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" class="au-input" id="password" name="password"
                 placeholder="Nhập mật khẩu..." autocomplete="current-password" required
                 style="padding-right:2.8rem;"/>
          <span class="password-toggle" id="togglePassword">
            <i class="fa-regular fa-eye" id="eyeIcon"></i>
          </span>
        </div>
        <div class="form-error" id="err-password">Vui lòng nhập mật khẩu.</div>
      </div>

      <div class="au-form-group remember-row">
        <label class="au-checkbox">
          <input type="checkbox" name="remember" id="rememberMe"/> Ghi nhớ đăng nhập
        </label>
        <a href="#" class="forgot-link">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="btn-au-primary w-100" id="loginBtn" style="width:100%;padding:0.85rem;">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Đăng Nhập
      </button>

      <div class="login-divider">hoặc</div>

      <div style="text-align:center;font-size:0.85rem;color:var(--gray-400);">
        Chưa có tài khoản?
        <a href="signup.html" style="color:var(--primary);font-weight:600;text-decoration:none;"> Đăng ký ngay</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // QUAN TRỌNG: Quét sạch bộ nhớ cũ ngay khi vào trang Login (Tính năng Đăng xuất)
  sessionStorage.removeItem('au_user');

  // Password toggle
  document.getElementById('togglePassword').addEventListener('click', function() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.className = 'fa-regular fa-eye-slash';
    } else {
      pw.type = 'password';
      icon.className = 'fa-regular fa-eye';
    }
  });

  // ─── XỬ LÝ ĐĂNG NHẬP ───
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault(); 

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    let valid = true;

    document.getElementById('err-username').style.display = 'none';
    document.getElementById('err-password').style.display = 'none';
    document.getElementById('username').classList.remove('error');
    document.getElementById('password').classList.remove('error');

    if (!username) {
      document.getElementById('username').classList.add('error');
      document.getElementById('err-username').style.display = 'block';
      valid = false;
    }
    if (!password) {
      document.getElementById('password').classList.add('error');
      document.getElementById('err-password').style.display = 'block';
      valid = false;
    }
    if (!valid) return;

    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Đang đăng nhập...';
    btn.disabled = true;

    try {
      const res = await fetch('http://localhost:8080/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
        signal: AbortSignal.timeout(3000), 
      });
      const data = await res.json();
      if (data.success) {
        // Lưu thông tin (kèm số điện thoại) vào phiên đăng nhập mới
        sessionStorage.setItem('au_user', JSON.stringify(data.user));
        if (data.user.role === 'admin') {
          window.location.href = 'admin/dashboard.html';
        } else {
          window.location.href = 'index.html';
        }
        return;
      } else {
        throw new Error(data.message || 'Sai tài khoản hoặc mật khẩu');
      }
    } catch (err) {
      showLoginError(err.message || 'Lỗi kết nối máy chủ');
    }

    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Đăng Nhập';
    btn.disabled = false;
  });

  function showLoginError(msg) {
    let errDiv = document.getElementById('login-error-global');
    if (!errDiv) {
      errDiv = document.createElement('div');
      errDiv.id = 'login-error-global';
      errDiv.style.cssText = 'background:#FEE2E2;border:1px solid #FCA5A5;border-radius:8px;padding:0.75rem 1rem;font-size:0.85rem;color:#B91C1C;margin-bottom:1rem;text-align:center;';
      document.getElementById('loginBtn').parentNode.insertBefore(errDiv, document.getElementById('loginBtn'));
    }
    errDiv.textContent = '❌ ' + msg;
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Đăng Nhập';
    btn.disabled = false;
  }
</script>
</body>
</html>
